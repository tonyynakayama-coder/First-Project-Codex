<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="The Snack Shack menu with quick prices and pickup location for students between classes."
    >
    <title>The Snack Shack</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="pickup-banner" aria-label="Snack Shack pickup location">
      <p>Pickup Location</p>
      <h1>Student Center Hallway</h1>
      <span>Open at lunch, outside Room 104</span>
    </header>

    <main>
      <section class="menu-section" aria-labelledby="menu-title">
        <div class="section-heading">
          <p>Today's Menu</p>
          <h2 id="menu-title">Tap a snack to see where to pick it up.</h2>
        </div>

        <div class="snack-grid">
          <button
            class="snack-card"
            type="button"
            data-name="Chocolate Chip Granola Bar"
            data-price="$1.25"
            data-location="Student Center Hallway, outside Room 104"
            data-time="Lunch period only"
          >
            <img src="assets/granola-bar.png" alt="Chocolate chip granola bar">
            <span class="snack-name">Chocolate Chip Granola Bar</span>
            <strong>$1.25</strong>
          </button>

          <button
            class="snack-card"
            type="button"
            data-name="Cheese Crackers"
            data-price="$1.00"
            data-location="Student Center Hallway, outside Room 104"
            data-time="Lunch period only"
          >
            <img src="assets/cheese-crackers.png" alt="Cheese crackers">
            <span class="snack-name">Cheese Crackers</span>
            <strong>$1.00</strong>
          </button>

          <button
            class="snack-card"
            type="button"
            data-name="Fresh Red Apple"
            data-price="$0.75"
            data-location="Student Center Hallway, outside Room 104"
            data-time="Lunch period only"
          >
            <img src="assets/red-apple.png" alt="Fresh red apple">
            <span class="snack-name">Fresh Red Apple</span>
            <strong>$0.75</strong>
          </button>

          <button
            class="snack-card"
            type="button"
            data-name="Fruit Punch Juice Box"
            data-price="$1.50"
            data-location="Student Center Hallway, outside Room 104"
            data-time="Lunch period only"
          >
            <img src="assets/juice-box.png" alt="Fruit punch juice box">
            <span class="snack-name">Fruit Punch Juice Box</span>
            <strong>$1.50</strong>
          </button>

          <button
            class="snack-card"
            type="button"
            data-name="Chocolate Chip Cookie"
            data-price="$1.00"
            data-location="Student Center Hallway, outside Room 104"
            data-time="Lunch period only"
          >
            <img src="assets/chocolate-chip-cookie.png" alt="Chocolate chip cookie">
            <span class="snack-name">Chocolate Chip Cookie</span>
            <strong>$1.00</strong>
          </button>

          <button
            class="snack-card"
            type="button"
            data-name="Trail Mix Cup"
            data-price="$1.75"
            data-location="Student Center Hallway, outside Room 104"
            data-time="Lunch period only"
          >
            <img src="assets/trail-mix-cup.png" alt="Trail mix cup">
            <span class="snack-name">Trail Mix Cup</span>
            <strong>$1.75</strong>
          </button>
        </div>
      </section>
    </main>

    <dialog class="pickup-dialog" id="pickup-dialog" aria-labelledby="pickup-title">
      <div class="dialog-top">
        <p id="pickup-price">$1.25</p>
        <button class="close-button" type="button" aria-label="Close pickup details">x</button>
      </div>
      <h2 id="pickup-title">Chocolate Chip Granola Bar</h2>
      <div class="pickup-detail">
        <span>Pick up at</span>
        <strong id="pickup-location">Student Center Hallway, outside Room 104</strong>
      </div>
      <div class="pickup-detail">
        <span>When</span>
        <strong id="pickup-time">Lunch period only</strong>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
